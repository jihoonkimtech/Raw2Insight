<!DOCTYPE html>
<html>
<head>
    <title>Raw2Insight AI Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; transition: background-color 0.5s; }
        .container { max-width: 700px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        
        .status-badge { padding: 10px 20px; border-radius: 5px; font-weight: bold; color: white; }
        .status-safe { background-color: #28a745; }
        .status-alert { background-color: #dc3545; animation: blink 1s infinite; }
        
        table { border-collapse: collapse; width: 100%; text-align: center; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; vertical-align: middle; }
        th { background-color: #f8f9fa; }
        .chart-container { position: relative; width: 100%; height: 300px; margin-top: 20px; }

        @keyframes blink { 50% { opacity: 0.5; } }
        .alert-bg { background-color: #ffe6e6; }

        /* device management panel */
        .device-panel { background: #f8f9fa; padding: 20px; margin-top: 30px; border-radius: 8px; border: 1px solid #ddd; }
        .device-panel h3 { margin-top: 0; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
        .device-panel h4 { margin-bottom: 10px; color: #333; }
        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .flex-col { flex: 1; min-width: 300px; background: #fff; padding: 15px; border-radius: 5px; border: 1px solid #eee; }
        .form-group { margin-bottom: 15px; }
        
        .form-group input, .form-group select { 
            padding: 8px; 
            width: 100%; 
            box-sizing: border-box;
            margin-top: 5px; 
            border: 1px solid #ccc; 
            border-radius: 4px;
            height: 36px;
        }
        
        .form-row-inner { display: flex; gap: 10px; width: 100%; }
        .form-row-inner > div { flex: 1; }

        .form-btn { background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        .form-btn:hover { background-color: #0056b3; }
        
        .delete-btn { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8em; }
        .delete-btn:hover { background-color: #c82333; }

        .act-container { margin-top: 10px; display: flex; gap: 10px; }
        .act-box { padding: 5px 12px; border-radius: 20px; font-size: 0.85em; font-weight: bold; transition: 0.3s; border: 1px solid #ccc; }
        .act-on { background-color: #ffc107; color: #000; border-color: #ffc107; box-shadow: 0 0 10px rgba(255, 193, 7, 0.7); } /* 불 들어온 효과 */
        .act-off { background-color: #e9ecef; color: #6c757d; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h2>Raw2Insight Edge AI</h2>
                <p>2초 단위 집계 및 Isolation Forest 이상 탐지</p>
            </div>
            <div id="aiStatus" class="status-badge status-safe">상태: 정상 (Normal)</div>
        </div>
        
        <div id="dynamic-charts-container"></div>
      
        <div class="device-panel">
            <h3>⚙️ 동적 장치 관리자 (Device Router)</h3>
            <div class="flex-row">
                <div class="flex-col">
                    <h4>📡 입력 장치 (Sensor) 등록</h4>
                    <div class="form-group">
                        <input type="text" id="sen-name" placeholder="기기 영문 이름 (예: Main_Temp)">
                    </div>
                    
                    <div class="form-group form-row-inner">
                        <div>
                            <input type="text" id="sen-datatype" placeholder="데이터 종류 (온도, 습도..)" list="type-list">
                            <datalist id="type-list">
                                <option value="온도"> <option value="습도"> <option value="조도"> <option value="거리">
                            </datalist>
                        </div>
                        <div>
                            <input type="text" id="sen-unit" placeholder="SI 단위 (°C, %, Lux..)" list="unit-list">
                            <datalist id="unit-list">
                                <option value="°C"> <option value="%"> <option value="Lux"> <option value="cm"> <option value="V">
                            </datalist>
                        </div>
                    </div>

                    <div class="form-group">
                        <select id="sen-protocol" onchange="updateSensorPinOptions()">
                            <option value="analog">Analog (아날로그)</option>
                            <option value="digital">Digital (디지털)</option>
                            <option value="i2c">I2C (버스 통신)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <select id="sen-pin-select"></select>
                        <input type="text" id="sen-pin-input" placeholder="I2C 주소 (예: 0x68)" style="display:none;">
                    </div>
                    <button class="form-btn" onclick="submitSensor()">센서 추가</button>
                </div>

                <div class="flex-col">
                    <h4>⚡ 출력 장치 (Actuator) 등록</h4>
                    <div class="form-group">
                        <input type="text" id="act-name" placeholder="기기 이름 (예: Emergency_Fan)">
                    </div>
                    <div class="form-group">
                        <select id="act-type" onchange="updateActuatorPinOptions()">
                            <option value="digital_out">일반 디지털 출력</option>
                            <option value="pwm">PWM (속도/밝기 제어)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <select id="act-pin"></select>
                    </div>
                    <div class="form-group form-row-inner">
                        <div>
                            <input type="number" id="act-trigger" placeholder="이상 시 출력 (0~255)">
                        </div>
                        <div>
                            <select id="act-link">
                                <option value="">연동 센서 선택...</option>
                            </select>
                        </div>
                    </div>
                    <button class="form-btn" onclick="submitActuator()">기기 추가</button>
                </div>
            </div>
        </div>
      <div class="device-panel" style="margin-top: 20px;">
            <h3>📋 등록된 기기 목록 (Device DB List)</h3>
            
            <h4>입력 장치 (Sensors)</h4>
            <table id="sensorListTable">
                <tr><th>ID</th><th>이름</th><th>프로토콜</th><th>핀/주소</th><th>관리</th></tr>
            </table>

            <h4 style="margin-top: 20px;">출력 장치 (Actuators)</h4>
            <table id="actuatorListTable">
                <tr><th>ID</th><th>이름</th><th>제어 방식</th><th>핀</th><th>동작값</th><th>연동 센서 ID</th><th>관리</th></tr>
            </table>
      </div>
    </div>

    <script>
        const socket = io();

        socket.on('connect', () => {
            socket.emit('client_ready', { status: "connected" });
        });

        // global chart object storage
        const charts = {};

        const colorPalette = [
            { border: '#007bff', bg: 'rgba(0, 123, 255, 0.2)' },  // 파랑
            { border: '#28a745', bg: 'rgba(40, 167, 69, 0.2)' },  // 초록
            { border: '#fd7e14', bg: 'rgba(253, 126, 20, 0.2)' }, // 주황
            { border: '#6f42c1', bg: 'rgba(111, 66, 193, 0.2)' }, // 보라
            { border: '#17a2b8', bg: 'rgba(23, 162, 184, 0.2)' }  // 청록
        ];

        // receive multi sensor data
        socket.on('update_dashboard_multi', function(payload) {
            const container = document.getElementById('dynamic-charts-container');
            
            // anomaly check
            let anyAnomaly = false;

            // travel sensors
            Object.keys(payload).forEach(sensorName => {
                const data = payload[sensorName];
                const rows = data.rows;
                const isAnomaly = data.alert;
                
                const sType = data.data_type || 'Data';
                const sUnit = data.unit || '';

                if (isAnomaly) anyAnomaly = true;

                // create dynamic DOM
                if (!document.getElementById(`panel-${sensorName}`)) {
                    const panelHTML = `
                        <div id="panel-${sensorName}" style="border: 1px solid #ccc; padding: 15px; border-radius: 8px; margin-top: 20px; background: #fff;">
                            <div class="header">
                                <h3 style="margin:0;">📊 ${sensorName} <span style="font-size:0.7em; color:#666;">(${sType})</span></h3>
                                <div id="status-${sensorName}" class="status-badge status-safe">상태: 정상</div>
                            </div>
                            <div id="act-container-${sensorName}" class="act-container"></div>
                            
                            <div class="chart-container">
                                <canvas id="chart-${sensorName}"></canvas>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', panelHTML);

                    const color = colorPalette[Object.keys(charts).length % colorPalette.length];

                    // init Chart.js
                    const ctx = document.getElementById(`chart-${sensorName}`).getContext('2d');
                    charts[sensorName] = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: [], 
                            datasets: [{
                                label: `${sType} 단위: ${sUnit}`,
                                data: [], 
                                borderColor: color.border,
                                backgroundColor: color.bg,
                                borderWidth: 2, fill: true, tension: 0.3
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false }
                    });

                    // store origin color
                    charts[sensorName].baseColor = color;
                }

                // update status badge
                const badge = document.getElementById(`status-${sensorName}`);
                const chartObj = charts[sensorName];

                if (isAnomaly) {
                    badge.className = 'status-badge status-alert';
                    badge.innerText = '⚠️ 이상 탐지됨!';
                    chartObj.data.datasets[0].borderColor = '#dc3545';
                    chartObj.data.datasets[0].backgroundColor = 'rgba(220, 53, 69, 0.2)';
                } else {
                    badge.className = 'status-badge status-safe';
                    badge.innerText = '✅ 정상 (Safe)';
                    chartObj.data.datasets[0].borderColor = chartObj.baseColor.border;
                    chartObj.data.datasets[0].backgroundColor = chartObj.baseColor.bg;
                }

                // render chart data
                const chartRows = [...rows].reverse();
                chartObj.data.labels = chartRows.map(row => row[0]);
                chartObj.data.datasets[0].data = chartRows.map(row => row[1]);

                const actContainer = document.getElementById(`act-container-${sensorName}`);
                if (actContainer) {
                    let actHTML = '';
                    const linkedActs = data.actuators || [];
                    
                    if (linkedActs.length > 0) {
                        linkedActs.forEach(act => {
                            const actClass = act.active ? 'act-on' : 'act-off';
                            const actText = act.active ? '⚡ 작동중 (ON)' : '💤 대기중 (OFF)';
                            actHTML += `<div class="act-box ${actClass}">⚙️ ${act.name}: ${actText}</div>`;
                        });
                    } else {
                        actHTML = `<div class="act-box act-off" style="opacity: 0.5;">연동된 출력 장치 없음</div>`;
                    }
                    actContainer.innerHTML = actHTML;
                }
              
                chartObj.update();
            });

            // global badge
            const mainBadge = document.getElementById('aiStatus');
            if(anyAnomaly) {
                document.body.classList.add('alert-bg');
                mainBadge.className = 'status-badge status-alert';
                mainBadge.innerText = '⚠️ 시스템 이상 발생!';
            } else {
                document.body.classList.remove('alert-bg');
                mainBadge.className = 'status-badge status-safe';
                mainBadge.innerText = '✅ 상태: 정상 (Normal)';
            }
        });

        // Device Management
        const actPinMap = {
            'digital_out': ['7', '8', '12', '13'],
            'pwm': ['3', '5', '6', '9', '10', '11'] 
        };
        const senPinMap = {
            'analog': ['A0', 'A1', 'A2', 'A3'],
            'digital': ['2', '4']
        };

        function updateActuatorPinOptions() {
            const type = document.getElementById('act-type').value;
            const pinSelect = document.getElementById('act-pin');
            pinSelect.innerHTML = ''; 
            
            actPinMap[type].forEach(pin => {
                const option = document.createElement('option');
                option.value = pin;
                option.text = `Pin ${pin}${type === 'pwm' ? ' (~)' : ''}`;
                pinSelect.appendChild(option);
            });
        }

        function updateSensorPinOptions() {
            const protocol = document.getElementById('sen-protocol').value;
            const pinSelect = document.getElementById('sen-pin-select');
            const pinInput = document.getElementById('sen-pin-input');
            
            if (protocol === 'analog') {
                pinSelect.style.display = 'block';
                pinInput.style.display = 'none';
                pinSelect.innerHTML = '';
                senPinMap[protocol].forEach(pin => {
                    const option = document.createElement('option');
                    option.value = pin;
                    option.text = `Pin ${pin}`;
                    pinSelect.appendChild(option);
                });
            } else if (protocol === 'digital') {
                pinSelect.style.display = 'block';
                pinInput.style.display = 'none';
                pinSelect.innerHTML = '';
                senPinMap[protocol].forEach(pin => {
                    const option = document.createElement('option');
                    option.value = pin;
                    option.text = `Pin D${pin}`;
                    pinSelect.appendChild(option);
                });
            } else {
                pinSelect.style.display = 'none';
                pinInput.style.display = 'block';
            }
        }

        function submitSensor() {
            const protocol = document.getElementById('sen-protocol').value;
            const pin = (protocol === 'analog' || protocol === 'digital') ? document.getElementById('sen-pin-select').value : document.getElementById('sen-pin-input').value;
            
            if(!document.getElementById('sen-name').value) {
                alert("센서 이름을 입력하세요."); return;
            }

            const data = {
                name: document.getElementById('sen-name').value,
                protocol: protocol,
                pin: pin,
                data_type: document.getElementById('sen-datatype').value,
                unit: document.getElementById('sen-unit').value
            };
            socket.emit('add_sensor_request', data);
            
            document.getElementById('sen-name').value = '';
            if(protocol === 'i2c') document.getElementById('sen-pin-input').value = '';
        }

        function submitActuator() {
            const name = document.getElementById('act-name').value;
            const triggerLogic = document.getElementById('act-trigger').value;
            const linkedId = document.getElementById('act-link').value;

            if(!name || triggerLogic === '' || linkedId === '') {
                alert("모든 필드를 정확히 입력하세요. (연동 센서 선택 필수)"); return;
            }

            const data = {
                name: name,
                control_type: document.getElementById('act-type').value,
                pin: document.getElementById('act-pin').value,
                trigger_logic: parseInt(triggerLogic),
                linked_sensor_id: parseInt(linkedId)
            };
            socket.emit('add_actuator_request', data);
            
            document.getElementById('act-name').value = '';
            document.getElementById('act-trigger').value = '';
            document.getElementById('act-link').value = '';
        }

        // delete registered sensor from DB
        function deleteDevice(type, id) {
            if(confirm(`정말 이 ${type === 'sensor' ? '센서' : '액추에이터'}를 삭제하시겠습니까?`)) {
                socket.emit('delete_device_request', { type: type, id: id });
            }
        }

        window.onload = () => {
            updateActuatorPinOptions();
            updateSensorPinOptions();
            socket.emit('request_device_list', {}); 
        };

        socket.on('device_list_updated', function(data) {
            console.log("Device DB updated:", data.type);
            socket.emit('request_device_list', {}); 
        });

        socket.on('update_device_list', function(payload) {
            const sensors = payload.sensors || [];
            const actuators = payload.actuators || [];
            
            const activeSensorNames = sensors.map(s => s.name);
            Object.keys(charts).forEach(sensorName => {
                if (!activeSensorNames.includes(sensorName)) {
                    charts[sensorName].destroy();
                    delete charts[sensorName];
                    const panel = document.getElementById(`panel-${sensorName}`);
                    if (panel) panel.remove(); // delete DOM
                }
            });

            // sensor table
            let senTableHTML = "<tr><th>ID</th><th>이름</th><th>종류/단위</th><th>프로토콜</th><th>핀/주소</th><th>관리</th></tr>";
            let linkOptionsHTML = '<option value="">연동 센서 선택...</option>';
            sensors.forEach(sen => {
                senTableHTML += `<tr>
                    <td>${sen.id}</td><td>${sen.name}</td>
                    <td>${sen.data_type || 'N/A'} <span style="color:#888;">(${sen.unit || '-'})</span></td>
                    <td>${sen.protocol}</td><td>${sen.pin}</td>
                    <td><button class="delete-btn" onclick="deleteDevice('sensor', ${sen.id})">❌ 삭제</button></td>
                </tr>`;
                linkOptionsHTML += `<option value="${sen.id}">${sen.name}</option>`;
            });
            document.getElementById('sensorListTable').innerHTML = senTableHTML;
            document.getElementById('act-link').innerHTML = linkOptionsHTML;

            // actuator table
            let actTableHTML = "<tr><th>ID</th><th>이름</th><th>제어 방식</th><th>핀</th><th>동작값</th><th>연동 센서</th><th>관리</th></tr>";
            actuators.forEach(act => {
                // sensor mapping
                const linkedSen = sensors.find(s => s.id === act.linked_sensor_id);
                const linkedName = linkedSen ? linkedSen.name : `ID:${act.linked_sensor_id} (삭제됨)`;
                actTableHTML += `<tr>
                    <td>${act.id}</td><td>${act.name}</td><td>${act.control_type}</td>
                    <td>${act.pin}</td><td>${act.trigger_logic}</td><td>${linkedName}</td>
                    <td><button class="delete-btn" onclick="deleteDevice('actuator', ${act.id})">❌ 삭제</button></td>
                </tr>`;
            });
            document.getElementById('actuatorListTable').innerHTML = actTableHTML;
        });
    </script>
</body>
</html>
