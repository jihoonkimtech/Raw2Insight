<!DOCTYPE html>
<html>
<head>
    <title>Raw2Insight AI Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; transition: background-color 0.5s; }
        .container { max-width: 700px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        
        /* AI Status Badge */
        .status-badge { padding: 10px 20px; border-radius: 5px; font-weight: bold; color: white; }
        .status-safe { background-color: #28a745; }
        .status-alert { background-color: #dc3545; animation: blink 1s infinite; }
        
        table { border-collapse: collapse; width: 100%; text-align: center; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        th { background-color: #f8f9fa; }
        .chart-container { position: relative; width: 100%; height: 300px; margin-top: 20px; }

        @keyframes blink { 50% { opacity: 0.5; } }
        .alert-bg { background-color: #ffe6e6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h2>Raw2Insight Edge AI</h2>
                <p>2초 단위 집계 및 Isolation Forest 이상 탐지</p>
            </div>
            <div id="aiStatus" class="status-badge status-safe">상태: 정상 (Normal)</div>
        </div>
        
        <div class="chart-container">
            <canvas id="sensorChart"></canvas>
        </div>

        <table id="dataTable">
            <tr><th>시간 (Aggregated Time)</th><th>2초 평균 값 (Mean Value)</th></tr>
        </table>
    </div>

    <script>
        const socket = io();
        const ctx = document.getElementById('sensorChart').getContext('2d');
        const aiStatusBadge = document.getElementById('aiStatus');
        
        const sensorChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], 
                datasets: [{
                    label: '집계된 센서 트렌드 (Mean)',
                    data: [], 
                    borderColor: '#007bff',
                    backgroundColor: 'rgba(0, 123, 255, 0.2)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        socket.on('connect', () => {
            socket.emit('client_ready', { status: "connected" });
        });

        // listen for new payload format (rows + alert status)
        socket.on('update_dashboard', function(payload) {
            const rows = payload.rows;
            const isAnomaly = payload.alert;

            // update Alert UI
            if (isAnomaly) {
                document.body.classList.add('alert-bg');
                aiStatusBadge.className = 'status-badge status-alert';
                aiStatusBadge.innerText = '이상 징후 감지됨! (Anomaly)';
                sensorChart.data.datasets[0].borderColor = '#dc3545';
                sensorChart.data.datasets[0].backgroundColor = 'rgba(220, 53, 69, 0.2)';
            } else {
                document.body.classList.remove('alert-bg');
                aiStatusBadge.className = 'status-badge status-safe';
                aiStatusBadge.innerText = '상태: 정상 (Safe)';
                sensorChart.data.datasets[0].borderColor = '#007bff';
                sensorChart.data.datasets[0].backgroundColor = 'rgba(0, 123, 255, 0.2)';
            }

            // update Table
            let tableHTML = "<tr><th>시간 (Aggregated Time)</th><th>2초 평균 값 (Mean Value)</th></tr>";
            rows.slice(0, 5).forEach(row => { // display only latest 5 in table
                tableHTML += `<tr><td>${row[0]}</td><td>${row[1]}</td></tr>`;
            });
            document.getElementById('dataTable').innerHTML = tableHTML;

            // update Chart (Chronological order)
            const chartRows = [...rows].reverse();
            sensorChart.data.labels = chartRows.map(row => row[0]);
            sensorChart.data.datasets[0].data = chartRows.map(row => row[1]);
            sensorChart.update();
        });
    </script>
</body>
</html>
